upstream backend {
    server backend:8000;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

# ── HTTP → HTTPS redirect ────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    # ── SSL certificate ──────────────────────────
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # ── SSL hardening ────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Security headers ─────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin"                       always;
    add_header Permissions-Policy        "geolocation=()"                      always;
    add_header Content-Security-Policy   "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self'; frame-src 'self';" always;

    # ── Gzip ─────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Frontend static files ─────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── API proxy ─────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 50M;
    }

    # ── Stricter rate limit for login ─────────────
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass       http://backend/api/auth/login;
        proxy_set_header Host        $host;
        proxy_set_header X-Real-IP   $remote_addr;
    }

    # ── Health check (no logging) ─────────────────
    location /health {
        access_log off;
        proxy_pass http://backend/api/health;
    }

    # ── Nginx stub_status — for Netdata nginx collector ───────
    # Only accessible from localhost (Netdata container)
    location /nginx_status {
        stub_status;
        access_log off;
        # Allow host network (Netdata), Docker subnets, internal network
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.0.0.0/8;      # covers Docker bridge 172.17.x.x
        allow 192.168.0.0/16;
        deny all;
    }

    # ── Netdata proxy — access monitoring at /monitor ─────────
    # Forwards https://YOUR-IP/monitor → http://localhost:19999
    # Allows access through port 443 when port 19999 is blocked
    # ── Netdata proxy — access monitoring at /monitor/ ──────────
    # Netdata runs in host-network mode, nginx in bridge mode.
    # "host-gateway" resolves to the Docker host IP — the correct
    # way to proxy from bridge container to host-network service.
    location /monitor/ {
        proxy_pass         http://host-gateway:19999/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support — required for Netdata live data streaming
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        # Do not re-compress — let Netdata handle encoding
        proxy_set_header   Accept-Encoding   "";
        proxy_buffering    off;
        # Long timeouts — Netdata keeps connections open for streaming
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }

    # ── Block hidden files ────────────────────────
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }

    # ── Logs ─────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}

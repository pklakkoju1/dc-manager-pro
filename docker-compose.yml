version: "3.9"

# ══════════════════════════════════════════════════════════════
# DC Manager Pro — Production Stack
#
# Deployment options:
#   App only:             docker compose up -d --build db backend frontend backup
#   App + Monitoring:     docker compose up -d --build
#
# All persistent data lives in ./volumes/
# Point your backup solution at: /appdata/dc-prod/volumes/
# ══════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: dcm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-dcuser}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme123}
      POSTGRES_DB:       ${DB_NAME:-dcmanager}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./volumes/backups:/backups
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dcuser} -d ${DB_NAME:-dcmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dcm-net
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dcm_backend
    restart: unless-stopped
    environment:
      DB_HOST:         db
      DB_PORT:         "5432"
      DB_NAME:         ${DB_NAME:-dcmanager}
      DB_USER:         ${DB_USER:-dcuser}
      DB_PASS:         ${DB_PASS:-changeme123}
      JWT_SECRET:      ${JWT_SECRET:-change-this-secret-min-32-chars-long}
      TOKEN_TTL_HOURS: ${TOKEN_TTL_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dcm-net
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Nginx + Frontend (HTTPS) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dcm_frontend
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - dcm-net
    # Allows nginx to reach host-network services (Netdata at :19999)
    # "host-gateway" resolves to the Docker host IP automatically
    extra_hosts:
      - "host-gateway:host-gateway"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Automated Backups ─────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: dcm_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASS:-changeme123}
      DB_USER:    ${DB_USER:-dcuser}
      DB_NAME:    ${DB_NAME:-dcmanager}
    volumes:
      - ./volumes/backups:/backups
      - ./scripts/entrypoint-backup.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dcm-net

  # ── Netdata — Real-time Monitoring ───────────────────────────
  #
  # Monitors:
  #   • This host machine (CPU/RAM/disk/network)
  #   • All Docker containers (dcm_postgres, dcm_backend, dcm_frontend, dcm_backup)
  #   • Container logs and error rates via Docker socket
  #   • Receives metrics streamed from child nodes (other servers)
  #
  # Dashboard: http://YOUR-SERVER-IP:19999
  #
  # To deploy WITHOUT Netdata:
  #   docker compose up -d --build db backend frontend backup
  #
  # To deploy WITH Netdata (default):
  #   docker compose up -d --build
  #
  # STREAM_API_KEY: set in .env — all child nodes must use this same key
  #
  netdata:
    image: netdata/netdata:stable
    container_name: dcm_netdata
    restart: unless-stopped
    network_mode: host
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - DO_NOT_TRACK=1
      - NETDATA_CLAIM_TOKEN=
      # API key child nodes use to authenticate.
      # Set this in your .env file — generate with: uuidgen
      # Must match --apikey used in install-netdata-child-*.sh
      - NETDATA_STREAM_API_KEY=${NETDATA_STREAM_API_KEY:-CHANGE-THIS-STREAM-KEY}
    # Custom entrypoint: writes stream.conf with the real API key
    # before starting Netdata (Netdata cannot substitute env vars in config files)
    entrypoint: ["/etc/netdata/run-entrypoint.sh"]
    volumes:
      # ── Startup script — writes stream.conf with actual API key ──────
      - ./scripts/netdata-entrypoint.sh:/etc/netdata/run-entrypoint.sh:ro
      # ── Config files ─────────────────────────────────────────────────
      - ./monitoring/netdata.conf:/etc/netdata/netdata.conf:ro
      - ./monitoring/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf:ro
      # ── go.d collector configs (nginx, postgres, httpcheck, docker) ──
      - ./monitoring/go.d:/etc/netdata/go.d:ro
      - ./volumes/netdata/lib:/var/lib/netdata
      - ./volumes/netdata/cache:/var/cache/netdata
      # ── Host access for full metrics collection ───────────────────────
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      # ── cgroups — mount host cgroup fs directly so Netdata can see
      #    all Docker containers (dcm_postgres, dcm_backend etc.)
      #    Required for Ubuntu 22.04+ which uses cgroups v2
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      # ── Docker socket — resolves container IDs to names ──────────────
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

networks:
  dcm-net:
    driver: bridge

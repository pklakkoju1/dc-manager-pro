version: "3.9"

# ══════════════════════════════════════════════════
# DC Manager Pro — Production Docker Compose
# Usage:
#   cp .env.example .env && nano .env   # set your passwords
#   docker compose up -d --build
#   Open: http://localhost:3000
# ══════════════════════════════════════════════════

services:

  # ── PostgreSQL ───────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: dcm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-dcuser}
      POSTGRES_PASSWORD: ${DB_PASS:-dcpassword123}
      POSTGRES_DB:       ${DB_NAME:-dcmanager}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./backups:/backups
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USER:-dcuser} -d ${DB_NAME:-dcmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [dcm-net]
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Backend API ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dcm_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:    "postgresql://${DB_USER:-dcuser}:${DB_PASS:-dcpassword123}@db:5432/${DB_NAME:-dcmanager}"
      JWT_SECRET:      ${JWT_SECRET:-CHANGE_THIS_SECRET_USE_32_CHARS_MIN}
      TOKEN_TTL_HOURS: ${TOKEN_TTL_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    networks: [dcm-net]
    expose: ["8000"]
    healthcheck:
      test: ["CMD-SHELL","python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Nginx + Frontend ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dcm_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks: [dcm-net]
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Daily Auto-Backup ────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: dcm_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASS:-dcpassword123}
      DB_USER:    ${DB_USER:-dcuser}
      DB_NAME:    ${DB_NAME:-dcmanager}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: >
      sh -c "chmod +x /backup.sh &&
             echo '0 2 * * * /backup.sh $$DB_USER $$DB_NAME db >> /backups/backup.log 2>&1' > /etc/crontabs/root &&
             crond -f -d 6"
    depends_on:
      db:
        condition: service_healthy
    networks: [dcm-net]

volumes:
  pgdata:
    driver: local

networks:
  dcm-net:
    driver: bridge

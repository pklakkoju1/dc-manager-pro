version: "3.9"

# ══════════════════════════════════════════════════
# DC Manager Pro — Production Stack
# All persistent data lives in ./volumes/
# Point your backup solution to: /appdata/dc-prod/volumes/
# ══════════════════════════════════════════════════

services:

  # ── PostgreSQL Database ──────────────────────────
  db:
    image: postgres:16-alpine
    container_name: dcm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-dcuser}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme123}
      POSTGRES_DB:       ${DB_NAME:-dcmanager}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./volumes/backups:/backups
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dcuser} -d ${DB_NAME:-dcmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      dcm-net:
        aliases: [db]
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── FastAPI Backend ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dcm_backend
    restart: unless-stopped
    environment:
      DB_HOST:         db
      DB_PORT:         "5432"
      DB_NAME:         ${DB_NAME:-dcmanager}
      DB_USER:         ${DB_USER:-dcuser}
      DB_PASS:         ${DB_PASS:-changeme123}
      JWT_SECRET:      ${JWT_SECRET:-change-this-secret-min-32-chars-long}
      TOKEN_TTL_HOURS: ${TOKEN_TTL_HOURS:-24}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    networks:
      dcm-net:
        aliases: [backend]
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Nginx + Frontend (HTTPS) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dcm_frontend
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - dcm-net
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Automated Daily Backups ──────────────────────
  backup:
    image: postgres:16-alpine
    container_name: dcm_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASS:-changeme123}
      DB_USER:    ${DB_USER:-dcuser}
      DB_NAME:    ${DB_NAME:-dcmanager}
    volumes:
      - ./volumes/backups:/backups
      - ./scripts/entrypoint-backup.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dcm-net

# ── NO named volumes — everything in ./volumes/ ──
networks:
  dcm-net:
    driver: bridge

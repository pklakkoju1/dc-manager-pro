# ══════════════════════════════════════════════════════════════
# DC Manager Pro — Netdata Alert Notifications
#
# Controls where Netdata sends alerts when thresholds are crossed.
# All methods are OFF by default — enable what you need.
#
# After editing this file, restart Netdata:
#   docker restart dcm_netdata
# ══════════════════════════════════════════════════════════════

# ── Cloud / Telemetry ─────────────────────────────────────────
SEND_CLOUD="NO"

# ── Email ─────────────────────────────────────────────────────
# Requires: postfix or sendmail installed on the host
#
# SEND_EMAIL="YES"
# DEFAULT_RECIPIENT_EMAIL="ops@yourcompany.com"
# SENDMAIL=/usr/sbin/sendmail

SEND_EMAIL="NO"

# ── Slack ─────────────────────────────────────────────────────
# Create an incoming webhook at https://api.slack.com/apps
#
# SEND_SLACK="YES"
# SLACK_WEBHOOK_URL="https://hooks.slack.com/services/T.../B.../..."
# DEFAULT_RECIPIENT_SLACK="#alerts"

SEND_SLACK="NO"

# ── Microsoft Teams ───────────────────────────────────────────
# SEND_MSTEAMS="YES"
# MSTEAMS_WEBHOOK_URL="https://yourcompany.webhook.office.com/..."
# DEFAULT_RECIPIENT_MSTEAMS="webhook"

SEND_MSTEAMS="NO"

# ── Disable everything else ───────────────────────────────────
SEND_TELEGRAM="NO"
SEND_PUSHOVER="NO"
SEND_TWILIO="NO"
SEND_HIPCHAT="NO"
SEND_MESSAGEBIRD="NO"
SEND_PUSHBULLET="NO"
SEND_FLOCK="NO"
SEND_DISCORD="NO"
SEND_SYSLOG="NO"
SEND_CUSTOM="NO"

# ══════════════════════════════════════════════════════════════
# DC Manager Pro — Netdata Configuration
#
# Merged from Netdata documentation defaults + DC Manager stack:
#   HOST:       VM or Bare Metal running Docker
#   CONTAINERS: dcm_frontend (Nginx), dcm_backend (FastAPI),
#               dcm_postgres (PostgreSQL), dcm_backup
#   BAREMETAL:  Child nodes enrolled via install scripts
#
# After editing: docker restart dcm_netdata
# Dashboard (direct):  http://YOUR-IP:19999
# Dashboard (proxy):   https://YOUR-IP/monitor/
# ══════════════════════════════════════════════════════════════

# ── GLOBAL ────────────────────────────────────────────────────
[global]
    # Set this to your actual server hostname for clarity
    hostname             = dc-manager-host

    update every         = 1          # collect metrics every second
    run as user          = netdata

    # Storage engine — disk-backed, handles many nodes efficiently
    memory mode          = dbengine

    # No Netdata Cloud — fully self-hosted / air-gapped
    cloud                = no
    anonymous statistics = no

    plugins directory    = /usr/libexec/netdata/plugins.d

# ── DATABASE ──────────────────────────────────────────────────
[db]
    mode             = dbengine
    storage path     = /var/cache/netdata/dbengine

    # How long to keep data
    # 7 days covers weekly reviews; increase if disk allows
    retention days   = 7

    # Disk space budget for metric history
    # 1024 MB ≈ 24h for 1 node
    # 2048 MB ≈ 7 days for 1 node
    # 8192 MB ≈ 7 days for 5 nodes
    disk space MB    = 2048

# ── WEB DASHBOARD ─────────────────────────────────────────────
[web]
    bind to                  = *
    port                     = 19999

    # Restrict to internal network only — adjust to your subnet
    allow connections from   = localhost 127.0.0.1 10.* 172.* 192.168.*

    # Allow streaming from child nodes
    allow streaming from     = 10.* 172.* 192.168.*

    enable gzip compression  = yes
    cache expiration         = 3600

    # SSL — not needed since we proxy through nginx HTTPS
    ssl enabled              = no

# ── PLUGINS ───────────────────────────────────────────────────
# What gets collected. Enable exactly what your stack needs.
# ──────────────────────────────────────────────────────────────
[plugins]
    # ── ESSENTIAL — VM + Bare Metal ──────────────────────────
    proc             = yes   # CPU, RAM, network, disk I/O, load average
    diskspace        = yes   # disk usage per mount point
    idlejitter       = yes   # CPU scheduling latency (VM noise detection)
    tc               = yes   # network traffic shaping / QoS

    # ── CONTAINERS — Docker metrics ──────────────────────────
    cgroups          = yes   # per-container CPU/RAM/IO/network

    # ── CONTAINER NAMES — resolves hex IDs → readable names ──
    # Calls Docker API via /var/run/docker.sock to map
    # cgroup IDs (docker_a1b2c3...) → container names (dcm_postgres)
    # Requires: /var/run/docker.sock mounted (already done)
    cgroup network interfaces = yes

    # ── PROCESS-LEVEL — nginx, python, postgres by name ──────
    apps             = yes   # per-process group resource usage

    # ── MODERN COLLECTORS — covers our full stack ─────────────
    # nginx metrics, postgres metrics, http checks, docker health
    go.d             = yes

    # ── LEGACY COLLECTORS — additional checks ─────────────────
    python.d         = yes   # additional DB collectors, fail2ban, etc.
    charts.d         = yes   # shell-based collectors

    # ── DISABLED — not needed ─────────────────────────────────
    node.d           = no
    netdata monitoring = no

# ── PROC PLUGIN — what to collect from /proc ──────────────────
[plugin:proc]
    # Network interfaces — bandwidth in/out per NIC
    /proc/net/dev            = yes

    # Disk throughput and IOPS
    /proc/diskstats          = yes

    # CPU time by mode (user, system, iowait, irq, steal)
    /proc/stat               = yes

    # RAM, buffers, cache, swap
    /proc/meminfo            = yes

    # Paging and swapping activity
    /proc/vmstat             = yes

    # TCP/UDP/ICMP protocol stats
    /proc/net/snmp           = yes
    /proc/net/snmp6          = yes

    # Open socket counts (TCP connections)
    /proc/net/sockstat       = yes

    # PSI — Pressure Stall Information (Linux 4.20+)
    # Detects CPU/IO/memory bottlenecks before they become visible
    /proc/pressure/cpu       = yes
    /proc/pressure/io        = yes
    /proc/pressure/memory    = yes

    # Load average (1/5/15 min)
    /proc/loadavg            = yes

    # Network softirq drops (packet loss at kernel level)
    /proc/net/softnet_stat   = yes

    # CPU frequency scaling
    enable cpuidle           = yes

    # Network filtering stats
    enable netfilter         = yes

# ── CGROUPS PLUGIN — Docker container metrics ─────────────────
[plugin:cgroups]
    # Ubuntu 22.04+ uses cgroups v2 unified hierarchy
    use unified cgroups          = yes

    # Where cgroup data is — mounted directly from host
    search for cgroups in        = /sys/fs/cgroup

    # Detect new containers within 10 seconds
    check for new cgroups every  = 10

    # Per-container metrics to collect
    enable cpuacct stat          = yes  # CPU usage
    enable memory                = yes  # RAM used / limit / cached
    enable blkio                 = yes  # disk read/write
    enable network               = yes  # network in/out
    enable cpu throttling        = yes  # detect CPU-throttled containers

    # Monitor systemd services as well (bare metal)
    enable systemd services      = yes

# ── DISKSPACE PLUGIN ──────────────────────────────────────────
[plugin:diskspace]
    update every     = 60     # check every 60 seconds (disk changes slowly)
    min disk size    = 50     # ignore tiny filesystems < 50MB

    # Exclude virtual/ephemeral filesystems
    exclude space metrics on paths = /proc /sys /var/run /run /dev /dev/shm /dev/pts
    exclude space metrics on filesystems = tmpfs devtmpfs

# ── APPS PLUGIN — per-process monitoring ──────────────────────
# Tracks nginx, python/uvicorn, postgres by process name.
# Configure which processes to group in /etc/netdata/apps_groups.conf
[plugin:apps]
    update charts = yes

# ── EBPF — advanced kernel-level metrics (optional) ──────────
# Provides system call tracing, per-process network stats,
# file I/O latency. Disable if causing performance issues.
[plugin:ebpf]
    enabled        = yes
    update every   = 10
    network viewer = yes     # per-process TCP connections
    enable file    = yes     # file I/O latency
    enable process = yes     # process lifecycle (fork/exec/exit)

# ── STATSD — application metrics push ────────────────────────
# Enable if your FastAPI app sends custom metrics via StatsD
[statsd]
    enabled      = no
    # enabled    = yes
    # listen     = 127.0.0.1
    # port       = 8125
    # update every = 10

# ── HEALTH / ALERTS ──────────────────────────────────────────
[health]
    enabled                      = yes
    health configuration directory = /etc/netdata/health.d
    script to execute on alarm   = /usr/libexec/netdata/plugins.d/alarm-notify.sh
    run alerts in parallel       = yes

# ── STREAMING PARENT — accepts child node connections ─────────
# The NETDATA_STREAM_API_KEY env var is written to stream.conf
# at startup by scripts/netdata-entrypoint.sh
# Do not configure streaming here — it is in stream.conf
[stream]
    enabled = no

# ── LOGGING ───────────────────────────────────────────────────
[logs]
    level      = info
    use syslog = no    # log to files, not syslog (Docker captures stdout)

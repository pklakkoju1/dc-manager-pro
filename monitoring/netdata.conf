# ══════════════════════════════════════════════════════════════
# DC Manager Pro — Netdata Parent (Master) Configuration
#
# This file configures the Netdata container that runs alongside
# the DC Manager app. It acts as the central monitoring hub:
#
#   - Monitors this host machine (CPU, RAM, disk, network)
#   - Monitors all DC Manager Docker containers via cgroups
#   - Collects container logs and error rates via Docker socket
#   - Receives and stores metrics from child nodes (other servers)
#   - Serves the dashboard at http://YOUR-SERVER-IP:19999
#
# After editing this file, restart Netdata:
#   docker restart dcm_netdata
# ══════════════════════════════════════════════════════════════

[global]
    # How often to collect metrics (seconds)
    update every = 1

    # Retention: 24 hours of per-second data
    # Increase dbengine disk space below for longer history
    history = 86400

    # Disk-based storage engine — allows long retention
    # without large RAM usage
    memory mode = dbengine

    # How much disk space to use for metric history (MB)
    # 1024 MB ≈ 24h for 1 node, ~8h for 5 nodes
    # 4096 MB ≈ several days for a small cluster
    dbengine disk space = 1024

    # No Netdata Cloud — fully self-hosted
    cloud = no
    anonymous statistics = no

[web]
    # Listen on all interfaces (host network mode)
    bind to = *
    port = 19999

    # Allow connections from internal network only
    # Adjust to your actual subnet
    allow connections from = localhost 127.0.0.1 10.* 172.* 192.168.*

    enable gzip compression = yes

[plugins]
    # Host system metrics
    proc       = yes     # CPU, memory, network, disk I/O
    diskspace  = yes     # disk space per mount point
    cgroups    = yes     # Docker container metrics
    tc         = yes     # network traffic control
    idlejitter = yes     # CPU scheduling latency
    apps       = yes     # per-process resource usage
    charts.d   = yes     # additional shell-based collectors
    python.d   = yes     # python-based collectors (postgres etc.)
    go.d       = yes     # go-based collectors
    node.d     = no
    netdata monitoring = no

[plugin:cgroups]
    # Docker container monitoring
    enable cpuacct stat  = yes
    enable memory        = yes
    enable blkio         = yes
    enable network       = yes
    # Give containers their names in the dashboard
    use unified cgroups  = yes
    search for cgroups in = /sys/fs/cgroup

[plugin:proc]
    # Host network interfaces
    /proc/net/dev        = yes
    /proc/diskstats      = yes
    /proc/stat           = yes
    /proc/meminfo        = yes
    /proc/vmstat         = yes
    /proc/net/snmp       = yes

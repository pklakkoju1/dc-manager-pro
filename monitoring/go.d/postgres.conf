# ── PostgreSQL collector for dcm_postgres ─────────────────────
# Metrics: queries/sec, connections, cache hit ratio, table stats,
#          locks, autovacuum, replication lag, database size
jobs:
  - name: dcm_postgres
    dsn: "postgres://dcuser:CHANGEME@localhost:5432/dcmanager?sslmode=disable"
    # Note: replace CHANGEME with your actual DB_PASS from .env
    # Or use environment variable substitution:
    # dsn: "postgres://dcuser:${DB_PASS}@localhost:5432/dcmanager?sslmode=disable"

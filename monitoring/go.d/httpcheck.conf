# ── HTTP endpoint health checks ───────────────────────────────
# Monitors response time and status for each endpoint.
# Alerts fire if endpoint is down or slow.
jobs:
  - name: dc_manager_app
    url: https://localhost/health
    tls_skip_verify: yes          # self-signed cert
    status_accepted:
      - 200
    response_timeout: 5s
    update_every: 10              # check every 10 seconds

  - name: dc_manager_api
    url: https://localhost/api/health
    tls_skip_verify: yes
    status_accepted:
      - 200
    response_timeout: 5s
    update_every: 10

  - name: netdata_self
    url: http://localhost:19999/api/v1/info
    status_accepted:
      - 200
    response_timeout: 3s
    update_every: 30

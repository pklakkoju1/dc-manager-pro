# ══════════════════════════════════════════════════════════════
# Netdata CHILD Node — Main Config
#
# Install on each bare metal server or VM you want to monitor.
# The child collects metrics and streams them to the parent.
# The child has NO web dashboard — all viewing is done on parent.
#
# Copy to: /etc/netdata/netdata.conf
# ══════════════════════════════════════════════════════════════

[global]
    run as user = netdata

    # Short local history — parent stores the long-term data
    history = 300

    # No cloud, no telemetry
    cloud = no
    anonymous statistics = no

    update every = 1

    # Minimal RAM mode — parent handles storage
    memory mode = ram

[web]
    # Child does NOT need a local web dashboard
    # Comment out the line below if you DO want a local dashboard on :19999
    mode = none

[plugins]
    proc = yes
    diskspace = yes
    cgroups = yes
    tc = yes
    idlejitter = yes
    apps = yes
    charts.d = yes
    python.d = yes
    node.d = no
    netdata monitoring = no

[plugin:proc]
    /proc/net/dev = yes
    /proc/diskstats = yes
    /proc/stat = yes
    /proc/meminfo = yes
    /proc/vmstat = yes
    /proc/net/snmp = yes
    /proc/net/snmp6 = yes

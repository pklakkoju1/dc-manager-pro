# ══════════════════════════════════════════════════════════════
# DC Manager Pro — Netdata Parent Streaming Configuration
#
# This file configures the dcm_netdata container to ACCEPT
# incoming metric streams from child nodes (other servers).
#
# HOW NETDATA STREAMING WORKS:
#   - Child nodes run a Netdata agent and send metrics here
#   - The parent (this node) stores and displays everything
#   - Authentication uses a shared API key
#
# PARENT CONFIG STRUCTURE:
#   [stream]              → controls outgoing streams (leave enabled=no)
#   [API_KEY_UUID]        → one section per accepted key, defines what
#                           to do with streams that authenticate with it
#
# IMPORTANT: Netdata does NOT substitute shell variables in this file.
# You must put your actual API key UUID directly in this file.
# The key must be a valid UUID (use: uuidgen to generate one).
#
# SETUP STEPS:
#   1. Generate a UUID:   uuidgen
#   2. Replace XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX below with it
#   3. Set the same UUID in your .env:  NETDATA_STREAM_API_KEY=<uuid>
#   4. Use the same UUID in --apikey when running child installers
#   5. Restart parent:   docker restart dcm_netdata
# ══════════════════════════════════════════════════════════════

# ── Outgoing streams — DISABLED on parent ─────────────────────
# The parent does not stream out to anyone.
[stream]
    enabled = no

# ── Accept incoming streams with this API key ──────────────────
# Replace the UUID below with your actual key (from uuidgen).
# This section header IS the API key — it must be a valid UUID.
#
[XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX]
    # Accept connections from internal network
    enabled          = yes
    allow from       = 10.* 172.* 192.168.* localhost

    # Store child metrics on disk (same as parent)
    default memory mode    = dbengine
    default history        = 86400

    # Apply health alerts automatically on child nodes
    health enabled by default = auto

    # Uncomment to set a label for this key's nodes
    # default labels = datacenter=prod
